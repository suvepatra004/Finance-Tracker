<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal FinTrack</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body class="auth-body">
    <div class="auth-wrapper">
      <div class="auth-card">
        <!-- Logo -->
        <div class="auth-logo">
          <span class="logo-icon">💰</span>
          <h1>FinTrack</h1>
          <p>Your personal finance companion</p>
        </div>

        <!-- Tab Switcher -->
        <div class="auth-tabs">
          <button class="tab-btn active" onclick="switchTab('login')">
            Login
          </button>
          <button class="tab-btn" onclick="switchTab('register')">
            Register
          </button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label>Email Address</label>
            <input
              type="email"
              id="loginEmail"
              placeholder="you@example.com"
              required
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="password-wrap">
              <input
                type="password"
                id="loginPassword"
                placeholder="••••••••"
                required
              />
              <span class="eye-toggle" onclick="togglePassword('loginPassword')"
                >👁</span
              >
            </div>
          </div>
          <div id="loginError" class="error-msg hidden"></div>
          <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
            Login
          </button>
        </form>

        <!-- Register Form -->
        <form
          id="registerForm"
          class="auth-form hidden"
          onsubmit="handleRegister(event)"
        >
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="regName" placeholder="John Doe" required />
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input
              type="email"
              id="regEmail"
              placeholder="you@example.com"
              required
            />
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="password-wrap">
              <input
                type="password"
                id="regPassword"
                placeholder="Min 6 characters"
                required
                minlength="6"
              />
              <span class="eye-toggle" onclick="togglePassword('regPassword')"
                >👁</span
              >
            </div>
          </div>
          <div id="registerError" class="error-msg hidden"></div>
          <div id="registerSuccess" class="success-msg hidden"></div>
          <button
            type="submit"
            class="btn btn-primary btn-full"
            id="registerBtn"
          >
            Create Account
          </button>
        </form>
      </div>
    </div>

    <script src="js/auth.js"></script>
  </body>
</html>
